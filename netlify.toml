[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"

# Apex/alt domain consolidation: theicesoak.com 301-redirects to icesoak.com.
[[redirects]]
  from = "https://theicesoak.com/*"
  to = "https://icesoak.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.theicesoak.com/*"
  to = "https://icesoak.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.icesoak.com/*"
  to = "https://icesoak.com/:splat"
  status = 301
  force = true

# Long-cache hashed static assets.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
