[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"

# Apex/alt domain consolidation: theicesoak.com 301-redirects to icesoak.com.
[[redirects]]
  from = "https://theicesoak.com/*"
  to = "https://icesoak.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.theicesoak.com/*"
  to = "https://icesoak.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.icesoak.com/*"
  to = "https://icesoak.com/:splat"
  status = 301
  force = true

# Legacy sitemap name → canonical sitemap index.
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap_index.xml"
  status = 301
  force = true

# Legacy studio slugs (older slugify version emitted 2 dashes where the current
# rule emits 3). Preserves indexed GSC URLs pointing to the same business.
[[redirects]]
  from = "/studio/city-sweats--wallingford-seattle/"
  to = "/studio/city-sweats---wallingford-seattle/"
  status = 301
  force = true

# Deduped studio slug — an older data snapshot suffixed a duplicate with "-3";
# current data holds a single canonical entry.
[[redirects]]
  from = "/studio/sweathouz-infrared-sauna-studio-atlanta-3/"
  to = "/studio/sweathouz-infrared-sauna-studio-atlanta/"
  status = 301
  force = true

# Orphaned studio URL (Belterra location no longer in data). Send to Austin
# metro landing page to preserve link equity without misidentifying a business.
[[redirects]]
  from = "/studio/sweathouz-belterra-contrast-therapy-studio-cedar-park/"
  to = "/cold-plunge/austin/"
  status = 301
  force = true

# Long-cache hashed static assets.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers applied to every response.
# CSP origins reflect ACTUAL usage: the map loads OpenStreetMap raster tiles
# (https://tile.openstreetmap.org) as <img>; Leaflet itself is bundled into
# /_next/static ('self'). The Google Maps / Google Fonts origins are kept from
# the standard template but are currently unused (site uses OSM + no web fonts).
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://maps.googleapis.com https://maps.gstatic.com https://tile.openstreetmap.org; connect-src 'self' https://maps.googleapis.com https://maps.gstatic.com https://www.bing.com https://tile.openstreetmap.org; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "unsafe-none"

# Keep Next.js build artifacts out of search results (does not block crawl/render).
[[headers]]
  for = "/_next/*"
  [headers.values]
    X-Robots-Tag = "noindex"
